  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

=\"font-size:14px;color:var(--muted)\">Welcome back, {{ user.name }}.<\u002Fdiv><\u002Fdiv><button onclick=\"{{ goChat }}\" style=\"background:var(--ink);color:#fff;border:none;border-radius:10px;padding:13px;font-size:15px;font-weight:600;cursor:pointer\" style-hover=\"background:#2a2a2a\">Open chat →<\u002Fbutton><button onclick=\"{{ signOut }}\" style=\"background:#fff;color:var(--ink);border:1px solid var(--line2);border-radius:10px;padding:12px;font-size:14px;font-weight:600;cursor:pointer\" style-hover=\"background:var(--hover)\">Sign out<\u002Fbutton><\u002Fdiv><\u002Fsc-if>\n      <sc-if value=\"{{ loggedOut }}\" hint-placeholder-val=\"{{ true }}\">\n      <div style=\"display:flex;flex-direction:column;gap:8px\">\n        <div style=\"font-size:26px;font-weight:700;letter-spacing:-.02em\">{{ authTitle }}<\u002Fdiv>\n        <div style=\"font-size:14px;color:var(--muted)\">{{ authSubtitle }}<\u002Fdiv>\n      <\u002Fdiv>\n\n      <form onsubmit=\"{{ submitAuth }}\" style=\"display:flex;flex-direction:column;gap:16px\">\n        <sc-if value=\"{{ showRegister }}\" hint-placeholder-val=\"{{ true }}\">\n        <label style=\"display:flex;flex-direction:column;gap:7px\">\n          <span style=\"font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:.1em;color:var(--muted);text-transform:uppercase\">Full name<\u002Fspan>\n          <input value=\"{{ fullName }}\" oninput=\"{{ onFullName }}\" placeholder=\"Jane Doe\" style=\"border:1px solid var(--line2);border-radius:10px;padding:12px 14px;font-size:15px;outline:none;background:transparent;color:var(--ink)\" style-focus=\"border:1px solid var(--ink)\">\n          <sc-if value=\"{{ errName }}\" hint-placeholder-val=\"\"><span style=\"font-size:12.5px;color:#c0392b\">{{ errName }}<\u002Fspan><\u002Fsc-if>\n        <\u002Flabel>\n        <\u002Fsc-if>\n        <label style=\"display:flex;flex-direction:column;gap:7px\">\n          <span style=\"font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:.1em;color:var(--muted);text-transform:uppercase\">Email<\u002Fspan>\n          <input value=\"{{ email }}\" oninput=\"{{ onEmail }}\" type=\"email\" placeholder=\"you@email.com\" style=\"border:1px solid var(--line2);border-radius:10px;padding:12px 14px;font-size:15px;outline:none;background:transparent;color:var(--ink)\" style-focus=\"border:1px solid var(--ink)\">\n          <sc-if value=\"{{ errEmail }}\" hint-placeholder-val=\"\"><span style=\"font-size:12.5px;color:#c0392b\">{{ errEmail }}<\u002Fspan><\u002Fsc-if>\n        <\u002Flabel>\n        <label style=\"display:flex;flex-direction:column;gap:7px\">\n          <span style=\"font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:.1em;color:var(--muted);text-transform:uppercase\">Password<\u002Fspan>\n          <input value=\"{{ password }}\" oninput=\"{{ onPassword }}\" type=\"password\" placeholder=\"••••••••\" style=\"border:1px solid var(--line2);border-radius:10px;padding:12px 14px;font-size:15px;outline:none;background:transparent;color:var(--ink)\" style-focus=\"border:1px solid var(--ink)\">\n          <sc-if value=\"{{ errPass }}\" hint-placeholder-val=\"\"><span style=\"font-size:12.5px;color:#c0392b\">{{ errPass }}<\u002Fspan><\u002Fsc-if>\n        <\u002Flabel>\n        <sc-if value=\"{{ showRegister }}\" hint-placeholder-val=\"{{ true }}\">\n        <label style=\"display:flex;flex-direction:column;gap:7px\">\n          <span style=\"font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:.1em;color:var(--muted);text-transform:uppercase\">Confirm password<\u002Fspan>\n          <input value=\"{{ confirm }}\" oninput=\"{{ onConfirm }}\" type=\"password\" placeholder=\"••••••••\" style=\"border:1px solid var(--line2);border-radius:10px;padding:12px 14px;font-size:15px;outline:none;background:transparent;color:var(--ink)\" style-focus=\"border:1px solid var(--ink)\">\n          <sc-if value=\"{{ errConfirm }}\" hint-placeholder-val=\"\"><span style=\"font-size:12.5px;color:#c0392b\">{{ errConfirm }}<\u002Fspan><\u002Fsc-if>\n        <\u002Flabel>\n        <\u002Fsc-if>\n        <sc-if value=\"{{ errForm }}\" hint-placeholder-val=\"\"><div style=\"font-size:13px;color:#c0392b;background:#fdecea;border:1px solid #f5c6c0;border-radius:8px;padding:10px 12px\">{{ errForm }}<\u002Fdiv><\u002Fsc-if>\n        <button type=\"submit\" disabled=\"{{ authPending }}\" style=\"margin-top:4px;background:var(--ink);color:#fff;border:none;border-radius:10px;padding:13px;font-size:15px;font-weight:600;cursor:pointer;transition:background .15s\" style-hover=\"background:#2a2a2a\">{{ authButtonText }}<\u002Fbutton>\n      <\u002Fform>\n\n      <div style=\"font-size:13.5px;color:var(--muted)\">{{ authSwitchText }} <span onclick=\"{{ switchAuth }}\" style=\"color:var(--ink);font-weight:600;cursor:pointer;text-decoration:underline;text-underline-offset:3px\">{{ authSwitchAction }}<\u002Fspan><\u002Fdiv>\n      <\u002Fsc-if>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n<\u002Fsc-if>\n\n<!-- ============ CHAT ============ -->\n<sc-if value=\"{{ showChat }}\" hint-placeholder-val=\"\">\n<div style=\"display:flex;height:100vh;width:100%\">\n  <!-- sidebar -->\n  <div style=\"width:264px;flex-shrink:0;background:var(--paper);border-right:1px solid var(--line);display:flex;flex-direction:column;height:100vh\">\n    <div onclick=\"{{ goAuth }}\" title=\"Home\" style=\"padding:18px 16px 12px;display:flex;align-items:center;gap:10px;cursor:pointer\">\n      <div style=\"font-family:'Frank Ruhl Libre',serif;font-weight:900;font-size:22px;direction:rtl;line-height:1\">תְּבוּנָה<\u002Fdiv>\n      <div style=\"font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:.16em;color:var(--muted);padding-top:3px\">TEVUNAH.AI<\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"padding:6px 12px 12px\">\n      <button onclick=\"{{ newChat }}\" style=\"width:100%;display:flex;align-items:center;justify-content:center;gap:8px;background:var(--ink);color:#f ckground:var(--live);flex-shrink:0;box-shadow:0 0 0 3px rgba(31,157,87,.14);animation:pulse 2.4s ease infinite\"><\u002Fspan>\n            <div style=\"flex:1;min-width:0\">\n              <div style=\"display:flex;align-items:center;gap:9px;flex-wrap:wrap\"><span style=\"font-size:16px;font-weight:600\">{{ m.name }}<\u002Fspan><span style=\"font-family:'JetBrains Mono',monospace;font-size:10.5px;color:var(--body);background:var(--chip);padding:3px 8px;border-radius:6px\">{{ m.backend }}<\u002Fspan><\u002Fdiv>\n              <div style=\"font-size:13px;color:var(--muted);margin-top:5px;line-height:1.55\">{{ m.desc }}<\u002Fdiv>\n            <\u002Fdiv>\n            <sc-if value=\"{{ m.active }}\" hint-placeholder-val=\"\">\n              <span style=\"font-family:'JetBrains Mono',monospace;font-size:10.5px;font-weight:500;color:#fff;background:var(--ink);padding:5px 10px;border-radius:6px;flex-shrink:0\">DEFAULT<\u002Fspan>\n            <\u002Fsc-if>\n            <sc-if value=\"{{ m.inactive }}\" hint-placeholder-val=\"\">\n              <span style=\"font-size:12.5px;color:var(--muted2);flex-shrink:0\">Set default<\u002Fspan>\n            <\u002Fsc-if>\n          <\u002Fdiv>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- preferences -->\n    <div style=\"display:flex;flex-direction:column;gap:14px\">\n      <div style=\"font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:.12em;color:var(--muted);text-transform:uppercase\">Account<\u002Fdiv>\n      <div style=\"border:1px solid var(--line);border-radius:14px;overflow:hidden\">\n        <div style=\"display:flex;align-items:center;justify-content:space-between;padding:15px 18px;border-bottom:1px solid var(--line)\"><span style=\"font-size:14px;color:var(--muted)\">Display name<\u002Fspan><span style=\"font-size:14px;font-weight:500\">{{ user.name }}<\u002Fspan><\u002Fdiv>\n        <div style=\"display:flex;align-items:center;justify-content:space-between;padding:15px 18px;border-bottom:1px solid var(--line)\"><span style=\"font-size:14px;color:var(--muted)\">Email<\u002Fspan><span style=\"font-size:14px;font-weight:500;font-family:'JetBrains Mono',monospace\">{{ user.email }}<\u002Fspan><\u002Fdiv>\n        <div style=\"display:flex;align-items:center;justify-content:space-between;padding:15px 18px\"><span style=\"font-size:14px;color:var(--muted)\">Conversations<\u002Fspan><span style=\"font-size:14px;font-weight:500\">{{ convCount }}<\u002Fspan><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <button onclick=\"{{ signOut }}\" style=\"align-self:flex-start;background:transparent;color:var(--ink);border:1px solid var(--line2);border-radius:10px;padding:12px 20px;font-size:14px;font-weight:600;cursor:pointer\" style-hover=\"background:#fdecea;border-color:#f5c6c0;color:#c0392b\">Sign out<\u002Fbutton>\n  <\u002Fdiv>\n<\u002Fdiv>\n<\u002Fsc-if>\n\n<!-- ============ ABOUT ============ -->\n<sc-if value=\"{{ showAbout }}\" hint-placeholder-val=\"\">\n<div style=\"height:100vh;width:100%;overflow-y:auto;overflow-x:hidden;--ink:#ffffff;--bg:#0b0b0c;--paper:#161617;--line:rgba(255,255,255,.1);--line2:rgba(255,255,255,.22);--muted:#9a9a9e;--muted2:#6e6e72;--chip:rgba(255,255,255,.08);--hover:rgba(255,255,255,.06);--body:#c4c4c8;background:var(--bg);color:var(--ink)\">\n  <div style=\"height:64px;border-bottom:1px solid var(--line);display:flex;align-items:center;justify-content:space-between;padding:0 32px;position:sticky;top:0;background:var(--bg);z-index:5\">\n    <div style=\"display:flex;align-items:center;gap:32px\">\n      <div onclick=\"{{ goAuth }}\" style=\"display:flex;align-items:center;gap:10px;cursor:pointer\">\n        <span style=\"font-family:'Frank Ruhl Libre',serif;font-weight:900;font-size:22px;direction:rtl;line-height:1\">תְּבוּנָה<\u002Fspan>\n        <span style=\"font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:.16em;color:var(--muted)\">TEVUNAH.AI<\u002Fspan>\n      <\u002Fdiv>\n      <div style=\"display:flex;align-items:center;gap:24px\">\n        <sc-if value=\"{{ loggedIn }}\" hint-placeholder-val=\"\"><span onclick=\"{{ goChat }}\" style=\"font-size:14px;font-weight:500;cursor:pointer;color:{{ chatColor }}\" style-hover=\"color:var(--ink)\">Chat<\u002Fspan><\u002Fsc-if>\n        <span onclick=\"{{ goMission }}\" style=\"font-size:14px;font-weight:500;cursor:pointer;color:{{ missionColor }}\" style-hover=\"color:var(--ink)\">Mission<\u002Fspan>\n        <a href=\"https://huggingface.co/TevunahAi\" target=\"_blank\" style=\"font-size:14px;font-weight:500;cursor:pointer;color:var(--muted);text-decoration:none\" style-hover=\"color:var(--ink)\">Hugging Face ↗<\u002Fa>\n        <span onclick=\"{{ goAbout }}\" style=\"font-size:14px;font-weight:500;cursor:pointer;color:{{ aboutColor }}\" style-hover=\"color:var(--ink)\">About<\u002Fspan>\n        <span onclick=\"{{ goContact }}\" style=\"font-size:14px;font-weight:500;cursor:pointer;color:{{ contactColor }}\" style-hover=\"color:var(--ink)\">Contact<\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <sc-if value=\"{{ loggedOut }}\" hint-placeholder-val=\"{{ true }}\"><button onclick=\"{{ goAuth }}\" style=\"background:var(--ink);color:var(--bg);border:none;border-radius:9px;padding:9px 17px;font-size:13.5px;font-weight:600;cursor:pointer\" style-hover=\"background:#2a2a2a\">Sign in<\u002Fbutton><\u002Fsc-if><sc-if value=\"{{ loggedIn }}\" hint-placeholder-val=\"\"><button onclick=\"{{ goChat }}\" style=\"background:var(--ink);color:var(--bg);border:none;border-radius:9px;padding:9px 17px;font-size:13.5px;font-weight:600;cursor:pointer\" style-hover=\"background:#2a2a2a\">Open chat →<\u002Fbutton><\u002Fsc-if>\n  <\u002Fdiv>\n\n  <div style=\"max-width:780px;margin:0 auto;padding:76px 32px 8px\">\n    <div style=\"font-family:'JetBrains Mono',monospace;font-size:12px;letter-spacing:.2em;color:var(--muted)\">ABOUT<\u002Fdiv>\n    <h1 style=\"font-family:'Frank Ruhl Libre',serif;font-weight:700;font-size:56px;line-height:1.08;letter-spacing:-.01em;margin:18px 0 0;text-wrap:balance\">Early days, from Mandan, North Dakota.<\u002Fh1>\n    <p style=\"font-size:18px;line-height:1.7;color:var(--body);margin:26px 0 0;max-width:640px;text-wrap:pretty\">TevunahAi is in its infancy stages. It is from Mandan, North Dakota of all places. We are just getting going. The Quantized models are the beginning. We have every intention to continue to bring highly quantized models to the masses for free as the industry moves forward. It is a way of learning and giving back as we move.<\u002Fp>\n    <p style=\"font-size:18px;line-height:1.7;color:var(--body);margin:22px 0 0;max-width:640px;text-wrap:pretty\">The next stages include hardware, autonomous systems, and even software. What that will look like even we aren't sure at this time, but it will be kept up with the evolutionary state of the artificial intelligence industry.<\u002Fp>\n  <\u002Fdiv>\n\n  <div style=\"max-width:780px;margin:0 auto;padding:48px 32px 0\">\n    <div style=\"display:grid;grid-template-columns:minmax(120px,170px) 1fr;gap:34px;padding:40px 0;border-top:1px solid var(--line)\">\n      <div style=\"font-family:'JetBrains Mono',monospace;font-size:12px;letter-spacing:.14em;color:var(--muted);text-transform:uppercase\">The name<\u002Fdiv>\n      <div style=\"display:flex;flex-direction:column;gap:16px\">\n        <div style=\"font-family:'Frank Ruhl Libre',serif;font-weight:700;font-size:42px;direction:rtl;line-height:1\">תְּבוּנָה<\u002Fdiv>\n        <p style=\"font-size:16px;line-height:1.75;color:var(--body);margin:0;text-wrap:pretty\">Tevunah is Hebrew for a deep form of insight and understanding — the ability to assimilate ideas into one's existence and make use of them throughout life. Taking the chaos associated with the life of a human and turning it into an efficient way to navigate life in an elevated manner.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"display:grid;grid-template-columns:minmax(120px,170px) 1fr;gap:34px;padding:40px 0;border-top:1px solid var(--line)\">\n      <div style=\"font-family:'JetBrains Mono',monospace;font-size:12px;letter-spacing:.14em;color:var(--muted);text-transform:uppercase\">Open by default<\u002Fdiv>\n      <div style=\"display:flex;flex-direction:column;gap:18px;align-items:flex-start\">\n        <p style=\"font-size:16px;line-height:1.75;color:var(--body);margin:0;text-wrap:pretty\">Our work lives in the open. Models, weights, and notes are published for anyone to inspect and build on.<\u002Fp>\n        <a href=\"https://huggingface.co/TevunahAi\" target=\"_blank\" style=\"display:inline-flex;align-items:center;gap:9px;background:var(--ink);color:var(--bg);border-radius:10px;padding:12px 18px;font-size:14px;font-weight:600;text-decoration:none\" style-hover=\"background:#2a2a2a\">Tevunah.Ai on Hugging Face ↗<\u002Fa>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <div style=\"max-width:780px;margin:0 auto;padding:36px 32px 56px;border-top:1px solid var(--line);margin-top:8px\"><div style=\"font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:.12em;color:var(--muted2)\">© 2026 TEVUNAH.AI — ALL RIGHTS RESERVED<\u002Fdiv><\u002Fdiv>\n<\u002Fdiv>\n<\u002Fsc-if>\n\n<!-- ============ MISSION ============ -->\n<sc-if value=\"{{ showMission }}\" hint-placeholder-val=\"\">\n<div style=\"height:100vh;width:100%;overflow-y:auto;overflow-x:hidden;--ink:#ffffff;--bg:#0b0b0c;--paper:#161617;--line:rgba(255,255,255,.1);--line2:rgba(255,255,255,.22);--muted:#9a9a9e;--muted2:#6e6e72;--chip:rgba(255,255,255,.08);--hover:rgba(255,255,255,.06);--body:#c4c4c8;background:var(--bg);color:var(--ink)\">\n  <div style=\"height:64px;border-bottom:1px solid var(--line);display:flex;align-items:center;justify-content:space-between;padding:0 32px;position:sticky;top:0;background:var(--bg);z-index:5\">\n    <div style=\"display:flex;align-items:center;gap:32px\">\n      <div onclick=\"{{ goAuth }}\" style=\"display:flex; ver=\"background:#2a2a2a\">Open chat →<\u002Fbutton><\u002Fsc-if>\n  <\u002Fdiv>\n\n  <div style=\"max-width:820px;margin:0 auto;padding:80px 32px 8px\">\n    <div style=\"font-family:'JetBrains Mono',monospace;font-size:12px;letter-spacing:.2em;color:var(--muted)\">MISSION<\u002Fdiv>\n    <h1 style=\"font-family:'Frank Ruhl Libre',serif;font-weight:700;font-size:50px;line-height:1.16;letter-spacing:-.01em;margin:18px 0 0;text-wrap:balance\">Weaving the complicated parts of life into a coherent, efficient understanding of the world.<\u002Fh1>\n  <\u002Fdiv>\n\n  <div style=\"max-width:820px;margin:0 auto;padding:44px 32px 0\">\n    <div style=\"display:flex;flex-direction:column;gap:26px;padding:36px 0;border-top:1px solid var(--line)\">\n      <p style=\"font-size:18px;line-height:1.75;color:var(--body);margin:0;max-width:680px;text-wrap:pretty\">The goal is to be able to take the complicated parts of life and weave together a coherent and complete understanding of the world around us that allows life to be efficient in every aspect of life.<\u002Fp>\n      <p style=\"font-size:18px;line-height:1.75;color:var(--body);margin:0;max-width:680px;text-wrap:pretty\">This can be applied to every area of life. Artificial intelligence is just that. It has arrived in the modern day as a thread that can be used to weave together multiple areas of thought that allow new and innovative ideas and ways of life to come about.<\u002Fp>\n      <p style=\"font-size:18px;line-height:1.75;color:var(--body);margin:0;max-width:680px;text-wrap:pretty\">Our goal is simple. In every application of artificial intelligence — whether it be hardware, software, autonomous systems, and etc. — that we have utilized every part of artificial intelligence in the most efficient way possible, but at the same time maintaining the true power that comes along with it. Short cuts will not be found here.<\u002Fp>\n      <p style=\"font-size:18px;line-height:1.75;color:var(--body);margin:0;max-width:680px;text-wrap:pretty\">This can be found in the Ultra Quantized models on Hugging Face. The goal was to be able to intelligently cut down the model size that would allow the user to still be able to have a high quality model that produces quality output, but at the same time the size was dramatically reduced. Through this, exposure was allowed. This opened up the door to individuals running consumer hardware to be able to experience higher quality models with limited deterioration.<\u002Fp>\n      <a href=\"https://huggingface.co/collections/TevunahAi/ultra-quantization-hybrid-model\" target=\"_blank\" style=\"font-size:16px;font-weight:600;color:var(--ink);text-decoration:none;border-bottom:1px solid var(--line2);align-self:flex-start;padding-bottom:2px\" style-hover=\"border-color:var(--ink)\">Ultra Quantization — Hybrid Model collection ↗<\u002Fa>\n      <p style=\"font-size:18px;line-height:1.75;color:var(--body);margin:0;max-width:680px;text-wrap:pretty\">We don't know where the world or the industry is going, but we will be there with the intent of innovation and efficiency.<\u002Fp>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <div style=\"max-width:820px;margin:0 auto;padding:40px 32px 56px;border-top:1px solid var(--line);margin-top:8px\">\n    <div style=\"font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:.12em;color:var(--muted2)\">© 2026 TEVUNAH.AI<\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n<\u002Fsc-if>\n\n<!-- ============ CONTACT ============ -->\n<sc-if value=\"{{ showContact }}\" hint-placeholder-val=\"\">\n<div style=\"height:100vh;width:100%;overflow-y:auto;overflow-x:hidden;--ink:#ffffff;--bg:#0b0b0c;--paper:#161617;--line:rgba(255,255,255,.1);--line2:rgba(255,255,255,.22);--muted:#9a9a9e;--muted2:#6e6e72;--chip:rgba(255,255,255,.08);--hover:rgba(255,255,255,.06);--body:#c4c4c8;background:var(--bg);color:var(--ink)\">\n  <div style=\"height:64px;border-bottom:1px solid var(--line);display:flex;align-items:center;justify-content:space-between;padd -top:1px solid var(--line);margin-top:8px\"><div style=\"font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:.12em;color:var(--muted2)\">© 2026 TEVUNAH.AI — ALL RIGHTS RESERVED<\u002Fdiv><\u002Fdiv>\n<\u002Fdiv>\n<\u002Fsc-if>\n\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;startScreen&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;options&quot;:[&quot;login&quot;,&quot;register&quot;,&quot;chat&quot;,&quot;account&quot;,&quot;about&quot;,&quot;mission&quot;,&quot;contact&quot;],&quot;default&quot;:&quot;login&quot;,&quot;tsType&quot;:&quot;string&quot;,&quot;section&quot;:&quot;Prototype&quot;},&quot;streamSpeed&quot;:{&quot;editor&quot;:&quot;range&quot;,&quot;default&quot;:34,&quot;min&quot;:8,&quot;max&quot;:80,&quot;step&quot;:2,&quot;unit&quot;:&quot;ms&quot;,&quot;tsType&quot;:&quot;number&quot;,&quot;section&quot;:&quot;Prototype&quot;},&quot;showDisclaimer&quot;:{&quot;editor&quot;:&quot;boolean&quot;,&quot;default&quot;:true,&quot;tsType&quot;:&quot;boolean&quot;,&quot;section&quot;:&quot;Chat&quot;}}\">\nclass Component extends DCLogic {\n  constructor(props) {\n    super(props);\n    this.fileRef = React.createRef();\n    this.threadRef = React.createRef();\n    this._timer = null;\n    this.MODELS = {\n      '27b': { id: '27b', name: 'MedGemma 27B', backend: 'MI100 · INT8', desc: 'Largest model. Deepest reasoning for complex or multi-step clinical questions.' },\n      '4b':  { id: '4b',  name: 'MedGemma 4B',  backend: 'A30 · BF16',   desc: 'Fast and lightweight. Ideal for quick lookups and everyday questions.' }\n    };\n    this.REPLIES = [\n      \"Thanks for the question. Here's a general overview:\\n\\n• The presentation you describe has several common explanations, ranging from benign to ones that warrant closer evaluation.\\n• Key factors that change the picture include onset, duration, associated symptoms, and relevant history.\\n• Red flags that would prompt urgent assessment include severe or worsening symptoms, fever, or any neurological changes.\\n\\nIf you can share more detail (age, timeline, vitals, history), I can narrow this down further.\",\n      \"Good question. At a high level:\\n\\n1. Start with the most likely differentials given the typical population and context.\\n2. Confirm with focused history and a targeted exam before ordering investigations.\\n3. Use first-line workup proportionate to risk, escalating only if findings or red flags appear.\\n\\nThis is general educational information — the right next step always depends on the specific patient in front of you.\",\n      \"Here is a concise summary:\\n\\nThe mechanism here typically involves the interplay between the underlying condition and how it presents clinically. Management is usually staged — address immediate stability first, then the underlying cause, then prevention of recurrence.\\n\\nWould you like me to go deeper on the workup, the differential, or the management options?\",\n      \"I can help with that. A reasonable framework:\\n\\n• Assessment — what to look for and which findings matter most.\\n• Investigation — the minimal set of tests that meaningfully changes management.\\n• Management — conservative measures first, then escalation criteria.\\n\\nLet me know which part you'd like expanded, and feel free to attach any notes or imaging.\"\n    ];\n    const ss = props && props.startScreen;\n    const guest = { name: 'Guest', email: 'guest@tevunah.ai', initials: 'G' };\n    let screen = 'auth', authMode = 'login', user = null;\n    if (ss === 'register') { authMode = 'register'; }\n    else if (ss === 'chat') { screen = 'chat'; user = guest; }\n    else if (ss === 'account') { screen = 'account'; user = guest; }\n    else if (ss === 'about') { screen = 'about'; }\n    else if (ss === 'mission') { screen = 'mission'; }\n    else if (ss === 'contact') { screen = 'contact'; }\n    this.state = {\n      screen, authMode, user,\n      fullName: '', email: '
