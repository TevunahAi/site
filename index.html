  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

mily:inherit}\n  textarea{resize:none}\n  @keyframes blink{50%{opacity:0}}\n  @keyframes fadein{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:none}}\n  @keyframes spin{to{transform:rotate(360deg)}}\n  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.35}}\n  ::-webkit-scrollbar{width:11px;height:11px}\n  ::-webkit-scrollbar-thumb{background:#e2e2e2;border-radius:8px;border:3px solid transparent;background-clip:padding-box}\n  ::-webkit-scrollbar-thumb:hover{background:#cdcdcd;background-clip:padding-box;border:3px solid transparent}\n  ::-webkit-scrollbar-track{background:transparent}\n<\u002Fstyle>\n<\u002Fhelmet>\n<div style=\"--ink:#0b0b0c;--bg:#ffffff;--paper:#fafafa;--line:#eeeeee;--line2:#e2e2e2;--muted:#8a8a8e;--muted2:#b4b4b8;--hover:#f3f3f2;--chip:#f0f0ee;--live:#1f9d57;--body:#3a3a3c;height:100vh;width:100%;overflow:hidden;background:var(--bg);color:var(--ink);font-family:'Hanken Grotesk',system-ui,sans-serif;-webkit-font-smoothing:antialiased;font-size:15px\">\n\n<!-- ============ AUTH ============ -->\n<sc-if value=\"{{ showAuth }}\" hint-placeholder-val=\"{{ true }}\">\n<div style=\"display:flex;height:100vh;width:100%\">\n  <!-- left brand panel -->\n  <div style=\"flex:1;background:var(--ink);color:#fff;display:flex;flex-direction:column;justify-content:space-between;padding:48px 52px;min-width:0\">\n    <div style=\"display:flex;align-items:center;gap:14px 24px;flex-wrap:wrap\">\n      <div onclick=\"{{ goAuth }}\" style=\"display:flex;align-items:center;gap:11px;cursor:pointer\">\n        <span style=\"font-family:'Frank Ruhl Libre',serif;font-weight:900;font-size:22px;direction:rtl;line-height:1;color:#fff\">תְּבוּנָה<\u002Fspan>\n        <span style=\"font-family:'JetBrains Mono',monospace;font-size:12px;letter-spacing:.22em;color:#fff\">TEVUNAH.AI<\u002Fspan>\n      <\u002Fdiv>\n      <sc-if value=\"{{ loggedIn }}\" hint-placeholder-val=\"\"><span onclick=\"{{ goChat }}\" style=\"font-size:13.5px;font-weight:500;color:#9a9a9e;cursor:pointer\" style-hover=\"color:#fff\">Chat<\u002Fspan><\u002Fsc-if>\n      <span onclick=\"{{ goMission }}\" style=\"font-size:13.5px;font-weight:500;color:#9a9a9e;cursor:pointer\" style-hover=\"color:#fff\">Mission<\u002Fspan>\n      <span onclick=\"{{ goServices }}\" style=\"font-size:13.5px;font-weight:500;color:#9a9a9e;cursor:pointer\" style-hover=\"color:#fff\">Services<\u002Fspan>\n      <a href=\"https://huggingface.co/TevunahAi\" target=\"_blank\" style=\"font-size:13.5px;font-weight:500;color:#9a9a9e;cursor:pointer;text-decoration:none\" style-hover=\"color:#fff\">Hugging Face ↗<\u002Fa>\n      <span onclick=\"{{ goAbout }}\" style=\"font-size:13.5px;font-weight:500;color:#9a9a9e;cursor:pointer\" style-hover=\"color:#fff\">About<\u002Fspan>\n      <span onclick=\"{{ goContact }}\" style=\"font-size:13.5px;font-weight:500;color:#9a9a9e;cursor:pointer\" style-hover=\"color:#fff\">Contact<\u002Fspan>\n    <\u002Fdiv>\n    <div style=\"display:flex;flex-direction:column;gap:22px;max-width:460px\">\n      <div style=\"font-family:'Frank Ruhl Libre',serif;font-weight:900;font-size:96px;line-height:.9;direction:rtl\">תְּבוּנָה<\u002Fdiv>\n      <div style=\"font-size:15px;line-height:1.7;color:#c8c8cc;text-wrap:pretty\">Hebrew for a deep form of insight and understanding — assimilating ideas into your existence and turning the chaos of life into a way to navigate it in an elevated manner.<\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:.12em;color:#6a6a6e\">© 2026 TEVUNAH.AI — ALL RIGHTS RESERVED<\u002Fdiv>\n  <\u002Fdiv>\n  <!-- right form panel -->\n  <div style=\"width:520px;max-width:48vw;background:var(--bg);display:flex;align-items:center;justify-content:center;padding:40px\">\n    <div style=\"width:100%;max-width:360px;display:flex;flex-direction:column;gap:26px\">\n      <sc-if value=\"{{ loggedIn }}\" hint-placeholder-val=\"\"><div style=\"display:flex;flex-direction:column;gap:20px\"><div style=\"display:flex;flex-direction:column;gap:8px\"><div style=\"font-size:26px;font-weight:700;letter-spacing:-.02em\">You're signed in<\u002Fdiv><div style=\"font-size:14px;color:var(--muted)\">Welcome back, {{ user.name }}.<\u002Fdiv><\u002Fdiv><button onclick=\"{{ goChat }}\" style=\"background:var(--ink);color:#fff;border:none;border-radius:10px;padding:13px;font-size:15px;font-weight:600;cursor:pointer\" style-hover=\"background:#2a2a2a\">Open chat →<\u002Fbutton><button onclick=\"{{ signOut }}\" style=\"background:#fff;color:var(--ink);border:1px solid var(--line2);border-radius:10px;padding:12px;font-size:14px;font-weight:600;cursor:pointer\" style-hover=\"background:var(--hover)\">Sign out<\u002Fbutton><\u002Fdiv><\u002Fsc-if>\n      <sc-if value=\"{{ loggedOut }}\" hint-placeholder-val=\"{{ true }}\">\n      <div style=\"display:flex;flex-direction:column;gap:8px\">\n        <div style=\"font-size:26px;font-weight:700;letter-spacing:-.02em\">{{ authTitle }}<\u002Fdiv>\n        <div style=\"font-size:14px;color:var(--muted)\">{{ authSubtitle }}<\u002Fdiv>\n      <\u002Fdiv>\n\n      <form onsubmit=\"{{ submitAuth }}\" style=\"display:flex;flex-direction:column;gap:16px\">\n        <sc-if value=\"{{ showRegister }}\" hint-placeholder-val=\"{{ true }}\">\n        <label style=\"display:flex;flex-direction:column;gap:7px\">\n          <span style=\"font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:.1em;color:var(--muted);text-transform:uppercase\">Full name<\u002Fspan>\n          <input value=\"{{ fullName }}\" oninput=\"{{ onFullName }}\" placeholder=\"Jane Doe\" style=\"border:1px solid var(--line2);border-radius:10px;padding:12px 14px;font-size:15px;outline:none;background:transparent;color:var(--ink)\" style-focus=\"border:1px solid var(--ink)\">\n          <sc-if value=\"{{ errName }}\" hint-placeholder-val=\"\"><span style=\"font-size:12.5px;color:#c0392b\">{{ errName }}<\u002Fspan><\u002Fsc-if>\n        <\u002Flabel>\n        <\u002Fsc-if>\n        <label style=\"display:flex;flex-direction:column;gap:7px\">\n          <span style=\"font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:.1em;color:var(--muted);text-transform:uppercase\">Email<\u002Fspan>\n          <input value=\"{{ email }}\" oninput=\"{{ onEmail }}\" type=\"email\" placeholder=\"you@email.com\" style=\"border:1px solid var(--line2);border-radius:10px;padding:12px 14px;font-size:15px;outline:none;background:transparent;color:var(--ink)\" style-focus=\"border:1px solid var(--ink)\">\n          <sc-if value=\"{{ errEmail }}\" hint-placeholder-val=\"\"><span style=\"font-size:12.5px;color:#c0392b\">{{ errEmail }}<\u002Fspan><\u002Fsc-if>\n        <\u002Flabel>\n        <label style=\"display:flex;flex-direction:column;gap:7px\">\n          <span style=\"font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:.1em;color:var(--muted);text-transform:uppercase\">Password<\u002Fspan>\n          <input value=\"{{ password }}\" oninput=\"{{ onPassword }}\" type=\"password\" placeholder=\"••••••••\" style=\"border:1px solid var(--line2);border-radius:10px;padding:12px 14px;font-size:15px;outline:none;background:transparent;color:var(--ink)\" style-focus=\"border:1px solid var(--ink)\">\n          <sc-if value=\"{{ errPass }}\" hint-placeholder-val=\"\"><span style=\"font-size:12.5px;color:#c0392b\">{{ errPass }}<\u002Fspan><\u002Fsc-if>\n        <\u002Flabel>\n        <sc-if value=\"{{ showRegister }}\" hint-placeholder-val=\"{{ true }}\">\n        <label style=\"display:flex;flex-direction:column;gap:7px\">\n          <span style=\"font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:.1em;color:var(--muted);text-transform:uppercase\">Confirm password<\u002Fspan>\n          <input value=\"{{ confirm }}\" oninput=\"{{ onConfirm }}\" type=\"password\" placeholder=\"••••••••\" style=\"border:1px solid var(--line2);border-radius:10px;padding:12px 14px;font-size:15px;outline:none;background:trans ht and understanding — the ability to assimilate ideas into one's existence and make use of them throughout life. Taking the chaos associated with the life of a human and turning it into an efficient way to navigate life in an elevated manner.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"display:grid;grid-template-columns:minmax(120px,170px) 1fr;gap:34px;padding:40px 0;border-top:1px solid var(--line)\">\n      <div style=\"font-family:'JetBrains Mono',monospace;font-size:12px;letter-spacing:.14em;color:var(--muted);text-transform:uppercase\">Open by default<\u002Fdiv>\n      <div style=\"display:flex;flex-direction:column;gap:18px;align-items:flex-start\">\n        <p style=\"font-size:16px;line-height:1.75;color:var(--body);margin:0;text-wrap:pretty\">Our work lives in the open. Models, weights, and notes are published for anyone to inspect and build on.<\u002Fp>\n        <a href=\"https://huggingface.co/TevunahAi\" target=\"_blank\" style=\"display:inline-flex;align-items:center;gap:9px;background:var(--ink);color:var(--bg);border-radius:10px;padding:12px 18px;font-size:14px;font-weight:600;text-decoration:none\" style-hover=\"background:#2a2a2a\">Tevunah.Ai on Hugging Face ↗<\u002Fa>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <div style=\"max-width:780px;margin:0 auto;padding:36px 32px 56px;border-top:1px solid var(--line);margin-top:8px\"><div style=\"font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:.12em;color:var(--muted2)\">© 2026 TEVUNAH.AI — ALL RIGHTS RESERVED<\u002Fdiv><\u002Fdiv>\n<\u002Fdiv>\n<\u002Fsc-if>\n\n<!-- ============ MISSION ============ -->\n<sc-if value=\"{{ showMission }}\" hint-placeholder-val=\"\">\n<div style=\"height:100vh;width:100%;overflow-y:auto;overflow-x:hidden;--ink:#ffffff;--bg:#0b0b0c;--paper:#161617;--line:rgba(255,255,255,.1);--line2:rgba(255,255,255,.22);--muted:#9a9a9e;--muted2:#6e6e72;--chip:rgba(255,255,255,.08);--hover:rgba(255,255,255,.06);--body:#c4c4c8;background:var(-
